<!DOCTYPE html>
<html>
  <body>
    <!-- Netlify build bot detects this at build time. The real form submits via fetch in contact.jsx -->
    <form name="commission" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="type"></select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
